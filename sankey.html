
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Sankey</title>

  <!-- Apache ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #chart {
      width: 100%;
      height: 100%;
    }
    button, select {
      background: #f1f1f1;
      border: 1px solid #d5d5d5;
      border-radius: 0.25rem;
      padding: 0.5em 1em;
      font-size: 14px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    button:hover, select:hover {
      background: #ffffff;
    }
    .buttons {
      display: flex;
      column-gap : 0.5rem;
      justify-content: center;
    }
    .title-bar {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      width: 85%;
      padding: 1.5em 1em 0em 1em;
    }
    .title-text {
      font-size: 28px;
      font-weight: bold;
      padding: 0;
      margin: 0;
      
    }
  </style>
</head>
<body>
  <div class="title-bar">
    <p class="title-text">Taxonomy Sankey</p>

    <div class="buttons">
      <button id="but1" onClick="set1reads()" >5% reads</button>
      <button id="but2" onClick="set05reads()" >1% reads</button>
      <button id="but3" onClick="set01reads()" >0.5% reads</button>

      <select id="depthSelect" onchange="onDepthChange()">
        <option value="2" selected>Up to Class</option>
        <option value="3">Up to Order</option>
        <option value="4">Up to Family</option>
        <option value="5">Up to Genus</option>
        <option value="6">Up to Species</option>
      </select>
    </div>
  </div>
<div id="chart"></div>

<script>
  let chart = echarts.init(document.getElementById('chart'));
  const data_1 = JSON.parse(
    document.getElementById("data_1").textContent
  );
  const data_0_5 = JSON.parse(
    document.getElementById("data_0_5").textContent
  );
  const data_0_1 = JSON.parse(
    document.getElementById("data_0_1").textContent
  );

  const ranks = ["Kingdom", "Phylum", "Class", "Order", "Family", "Genus", "Species"]
  

  const highlightPath = ['k__Pseudomonadati', 'p__Pseudomonadota', 'c__Alphaproteobacteria', 'o__Hyphomicrobiales', 'f__Nitrobacteraceae', 'g__Bradyrhizobium', 's__Bradyrhizobium_sp'];
  

  let highlightNodes = new Set(highlightPath);
  let highlightEdges = new Set(
    highlightPath.map((node, i) =>
      i < highlightPath.length - 1
        ? `${highlightPath[i]}→${highlightPath[i + 1]}`
        : null
    ).filter(Boolean)
  );  
  let currentDepth = 2
  let currentData = data_1
  let currentNode = ""

  
  function filterByDepth(data, maxDepth) {
    const allowedRanks = new Set(ranks.slice(0, maxDepth + 1));

    // keep nodes up to depth
    const nodes = data.nodes.filter(n => allowedRanks.has(n.rank));

    // names of kept nodes
    const names = new Set(nodes.map(n => n.name));

    // keep only edges whose endpoints both exist
    const links = data.links.filter(l =>
      names.has(l.source) && names.has(l.target)
    );

  return { nodes, links };
}
  function getParents(nodeId, links, path=[]) {
    const node = links
      .filter(l => l.target === nodeId)
      .map(l => l.source);
    path.push(nodeId)
    if (node.length === 0) {
      return path
    } else {
      return getParents(node[0], links, path)
    } 
  }
  

  function makeSankeyOptions(data) {
    console.log(currentDepth)
    filteredData = filterByDepth(data=data, maxDepth=currentDepth)

//    console.log(highlightPath)

    let customNodes = highlightPath.length > 0 ? highlightPath : getParents(currentNode, filteredData.links).reverse()
    let highlightNodes = new Set(customNodes);
    let highlightEdges = new Set(
      customNodes.map((node, i) =>
        i < customNodes.length - 1
          ? `${customNodes[i]}→${customNodes[i + 1]}`
          : null
      ).filter(Boolean)
    );  
//    console.log(customNodes)
//    console.log(highlightNodes)
//    console.log(highlightEdges)


    // console.log(getParents(filteredData.nodes[5].name, filteredData.links))
    
    const HIGHLIGHT_COLOR = "#FF637E"
    const styledNodes = filteredData.nodes.map(n => {
      if (highlightNodes.has(n.name)) {
        return {
          ...n,
          itemStyle: {
            color: HIGHLIGHT_COLOR,
            opacity: 1
          }
        };
      }
      return n; // keep level-based theme
    });

    const styledLinks = filteredData.links.map(l => {
      const key = `${l.source}→${l.target}`;
      if (highlightEdges.has(key)) {
        return {
          ...l,
          lineStyle: {
            color: HIGHLIGHT_COLOR,
            opacity: 0.65
          }
        };
      }
      return {
        ...l,
        lineStyle: {
        }
      };
    });

    return{
        tooltip: {
          trigger: 'item',
          triggerOn: 'mousemove',
          formatter: function (params) {
            return `
              <b>${params.name}</b><br/>
              Relative abundance: ${params.data.percent.toPrecision(4)} %<br/>
              Rank: ${params.data.rank}
            `;
          }
        },
        series: [{
          label: {
            show: true,
            silent: true,   // keeps tooltip hover working
            fontSize: 17,
            textBorderColor: 'transparent',
            lineHeight: 15,
            formatter: function (params) {
              const reads =
                typeof params.value === 'number'
                  ? params.value.toPrecision(4)
                  : 'NA';

              return `${params.data.label}\n${reads} %`;
            }
          },
          type: 'sankey',
          nodeGap: 25,
          nodeAlign: 'left',
          layoutIterations: 50,
          emphasis: {
            focus: 'adjacency'
          },
          lineStyle: {
            curveness: 0.30,
            color: 'source'
          },
          data: styledNodes,
          links: styledLinks,
            levels: [
                        {
                        depth: 0,
                        itemStyle: {
                            color: '#aba4fe'
                        },
                        lineStyle: {
                            color: '#aba4fe',
                            opacity: 0.6
                        }
                        },
                        {
                        depth: 1,
                        itemStyle: {
                            color: '#b3cde3'
                        },
                        lineStyle: {
                            color: '#b3cde3',
                            opacity: 0.6
                        }
                        },
                        {
                        depth: 2,
                        itemStyle: {
                            color: '#abf4d3'
                        },
                        lineStyle: {
                            color: '#abf4d3',
                            opacity: 0.6
                        }
                        },
                        {
                        depth: 3,
                        itemStyle: {
                            color: '#abf4a3'
                        },
                        lineStyle: {
                            color: '#abf4a3',
                            opacity: 0.6
                        }
                        },
                        {
                        depth:4,
                        itemStyle: {
                            color: '#94F38F'
                        },
                        lineStyle: {
                            color: '#94F28F',
                            opacity: 0.6
                        }
                        },
                        {
                        depth:5,
                        itemStyle: {
                            color: '#8FCE00'
                        },
                        lineStyle: {
                            color: '#8FCE00',
                            opacity: 0.6
                        }
                        }
                    ],
        }]
      };
  }

//  chart.setOption(makeSankeyOptions(data_0_5));
  rerenderChart(currentData)

//    currentNode = params.name;  // the clicked node's name/id
//    chart.setOption(makeSankeyOptions(currentData));

  function showToast(message) {
    const toast = document.createElement('div');
    toast.innerText = message;
    toast.style.cssText = `
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      z-index: 9999;
      font-size: 14px;
      opacity: 1;
      transition: opacity 0.5s ease;
    `;
    
    document.body.appendChild(toast);

    // fade out and remove after 3 seconds
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 500);
    }, 3000);
  }


  function rerenderChart(data, customNodes) {
    const dom = document.getElementById("chart");

    if (chart) {
      chart.dispose();
    }

    chart = echarts.init(dom);
    chart.on('click', { seriesType: 'sankey', dataType: 'node' }, (params) => {
      currentNode = params.name;  // the clicked node's name/id

      chart.setOption(makeSankeyOptions(data));
    });
    // Rightclick function
    chart.on('contextmenu', { seriesType: 'sankey', dataType: 'node' }, (params) => {
      params.event.event.preventDefault();
      const path = getParents(params.name, filteredData.links).reverse();
      
      // copy to clipboard
      navigator.clipboard.writeText(path.join("\n")).then(() => {
        showToast('Path copied to clipboard!');
      });
    });

    chart.setOption(makeSankeyOptions(data));

  }
